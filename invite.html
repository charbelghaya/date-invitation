<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Question ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="questionPage" class="question-page">

    <img id="photoDisplay" class="photo hidden">

    <h1 id="partnerText"></h1>

    <div class="button-area">

        <button id="yesBtn">YES ❤️</button>
        <button id="noBtn">NO 😭</button>

    </div>

</div>

<div id="successPage" class="hidden">

    <div class="card">

        <h1>YAYYY ❤️</h1>

        <h2 id="restaurantDisplay"></h2>
        <p id="dateDisplay"></p>
        <p id="timeDisplay"></p>
        <p id="messageDisplay"></p>

        <a id="mapsBtn" target="_blank">📍 Open Map</a>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
